<article class="post-row">
  <div class="post-date">{{ .Date.Format "Jan 2" }}</div>
  <div>
    <div class="post-meta">
      {{ with index .Params.tags 0 }}<span class="post-tag">{{ . }}</span><span class="post-sep">·</span>{{ end }}
      <span class="post-mins">{{ .ReadingTime }} min read</span>
    </div>
    <a href="{{ .Permalink }}" class="post-title">{{ .Title }}</a>
    <p class="post-excerpt">{{ .Summary }}</p>
    <a href="{{ .Permalink }}" class="post-readmore">Read more →</a>
  </div>
</article>
