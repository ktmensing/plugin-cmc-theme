{{ define "main" }}
{{ $posts := where .Site.RegularPages "Type" "post" }}
{{ $paginator := .Paginate $posts }}
<div class="page-wrap">
  <div class="lede">
    <svg width="32" height="32" viewBox="0 0 54 54" fill="none" aria-hidden="true">
      <ellipse cx="27" cy="27" rx="20" ry="12" stroke="#0D0D0D" stroke-width="2.5"/>
      <circle cx="27" cy="27" r="5.5" stroke="#0D0D0D" stroke-width="2.5"/>
      <circle cx="27" cy="27" r="2.5" fill="#0D0D0D"/>
      <line x1="16" y1="37" x2="13" y2="42" stroke="#0D0D0D" stroke-width="2"/>
      <line x1="22" y1="40" x2="21" y2="45" stroke="#0D0D0D" stroke-width="2"/>
      <line x1="32" y1="40" x2="33" y2="45" stroke="#0D0D0D" stroke-width="2"/>
      <line x1="38" y1="37" x2="41" y2="42" stroke="#0D0D0D" stroke-width="2"/>
    </svg>
    <h1 class="lede-wordmark">{{ .Site.Title }}</h1>
  </div>

  {{ range $paginator.Pages.GroupByDate "2006" }}
    <div class="year-group">
      <span class="year-label">{{ .Key }}</span>
    </div>
    {{ range .Pages }}
      {{ partial "post-row.html" . }}
    {{ end }}
  {{ end }}
</div>
{{ end }}
